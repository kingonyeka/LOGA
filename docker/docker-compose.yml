version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: loga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: loga
      POSTGRES_PASSWORD: loga_dev_password
      POSTGRES_DB: loga_bot
    ports:
      - '5432:5432'
    volumes:
      - loga_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U loga -d loga_bot']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loga-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - loga_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  loga_postgres_data:
  loga_redis_data: